name: CI Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Audit npm dependency graph
        run: npm audit --workspaces --include-workspace-root --audit-level=high

  test-and-coverage:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - name: Build SDK
        run: npm run build
      - name: CSP Compliance Audit
        run: npm run csp-audit
      - name: Check Bundle Size
        run: npm run size
